<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI удаление водяного знака</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.canvas-wrapper {
  position: relative;
  margin-top: 20px;
}

canvas {
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

#maskCanvas {
  position: absolute;
  left: 0;
  top: 0;
}

.controls {
  margin-top: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #3b82f6;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #2563eb;
}

input[type="range"] {
  width: 150px;
}
</style>
</head>

<body>

<h1>🧠 AI удаление водяного знака</h1>

<div class="container">

<input type="file" id="upload">

<div class="canvas-wrapper">
  <canvas id="imageCanvas"></canvas>
  <canvas id="maskCanvas"></canvas>
</div>

<div class="controls">
  <div>
    Размер кисти:
    <input type="range" id="size" min="5" max="60" value="25">
  </div>

  <button onclick="clearMask()">Очистить маску</button>
  <button onclick="removeWatermark()">Удалить AI</button>
  <button onclick="download()">Скачать результат</button>
</div>

</div>

<script>
const imgCanvas = document.getElementById('imageCanvas');
const maskCanvas = document.getElementById('maskCanvas');

const imgCtx = imgCanvas.getContext('2d');
const maskCtx = maskCanvas.getContext('2d');

let drawing = false;
let brush = 25;
let img = new Image();

document.getElementById('size').oninput = e => brush = e.target.value;

document.getElementById('upload').onchange = function(e){
  const reader = new FileReader();

  reader.onload = function(event){
    img.onload = function(){
      imgCanvas.width = img.width;
      imgCanvas.height = img.height;

      maskCanvas.width = img.width;
      maskCanvas.height = img.height;

      imgCtx.drawImage(img, 0, 0);
    }
    img.src = event.target.result;
  }

  reader.readAsDataURL(e.target.files[0]);
};

maskCanvas.onmousedown = () => drawing = true;
maskCanvas.onmouseup = () => drawing = false;

maskCanvas.onmousemove = function(e){
  if(!drawing) return;

  maskCtx.fillStyle = "rgba(255,255,255,0.6)";
  maskCtx.beginPath();
  maskCtx.arc(e.offsetX, e.offsetY, brush, 0, Math.PI*2);
  maskCtx.fill();
};

// 🔥 очистка маски
function clearMask(){
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
}

// 🔥 отправка в AI
async function removeWatermark(){
  const image = imgCanvas.toDataURL();
  const mask = maskCanvas.toDataURL();

  const res = await fetch("https://ai-watermark.onrender.com/remove", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ image, mask })
  });

  const data = await res.json();

  const result = new Image();
  result.src = data.result;

  result.onload = () => {
    imgCtx.drawImage(result, 0, 0);
    clearMask();
  }
}

// 🔥 скачать результат
function download(){
  const link = document.createElement('a');
  link.download = "result.png";
  link.href = imgCanvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
